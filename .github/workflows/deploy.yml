name: Build & Deploy to GitHub Pages

on:
  schedule:
    # Every 30 minutes during the tournament. Note: GitHub may delay
    # scheduled runs by several minutes under load.
    - cron: "*/30 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel in-progress deploys when a new run queues up — let them finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Seed managers, teams, and draft picks
        run: npm run seed

      - name: Pull latest match results from ESPN
        run: npm run sync

      - name: Build static site
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          NEXT_PUBLIC_BASE_PATH="/$REPO_NAME" npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
